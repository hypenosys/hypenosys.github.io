<style>
/* ─── VARIABLES ─── */
:root {
  --bg: #07070a;
  --header-h: 48px;
  --nav-h: 64px;
  --bg-gradient: radial-gradient(circle at 50% -20%, #150d35 0%, #07070a 60%);
  --surface: rgba(13,13,20,0.8);
  --surface-opaque: #0d0d14;
  --surface2: rgba(20,20,32,0.9);
  --surface-hover: rgba(255,255,255,0.04);
  --surface-active: rgba(124,58,237,0.12);
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --border-accent: rgba(124,58,237,0.3);
  --text: #f0f0f8;
  --text2: #9090b0;
  --text3: #505070;
  --accent: #7c3aed;
  --accent2: #a78bfa;
  --accent-grad: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
  --green: #10b981;
  --green-soft: rgba(16,185,129,0.12);
  --amber: #f59e0b;
  --amber-soft: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-soft: rgba(239,68,68,0.12);
  --cyan: #06b6d4;
  --cyan-soft: rgba(6,182,212,0.12);
  --claude-bg: rgba(209,168,255,0.08);
  --claude-border: rgba(180,130,255,0.3);
  --claude-text: #c4a5ff;
  --font-ui: 'Plus Jakarta Sans',sans-serif;
  --font-head: 'Outfit',sans-serif;
  --font-mono: 'JetBrains Mono',monospace;
  --sidebar: 258px;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-full: 9999px;
  --t-fast: 0.15s cubic-bezier(0.4,0,0.2,1);
  --t-norm: 0.25s cubic-bezier(0.4,0,0.2,1);
  --shadow-glow: 0 0 24px rgba(124,58,237,0.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;outline:none}
html{height:100%;scroll-behavior:smooth}
body{
  font-family:var(--font-ui);
  background:var(--bg);
  background-image:var(--bg-gradient);
  color:var(--text);
  height:100%;font-size:14px;line-height:1.5;
  overflow-x:hidden;display:flex;flex-direction:column;
  -webkit-text-size-adjust: 100%;
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:var(--r-full)}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* ─── LAYOUT ─── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.app.locked { filter: none; pointer-events: auto; user-select: auto; }

/* ─── AUTH GATE ─── */
.auth-overlay {
  position: fixed; inset: 0; z-index: 5000;
  display: flex; align-items: center; justify-content: center;
  background: rgba(7, 7, 10, 0.6);
  backdrop-filter: blur(4px) saturate(180%);
  -webkit-backdrop-filter: blur(4px) saturate(180%);
  opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
}
.auth-overlay.show { opacity: 1; pointer-events: auto; }
.auth-card {
  max-width: 400px; width: 90%; padding: 40px;
  background: var(--surface-opaque); border: 1px solid var(--border-accent);
  border-radius: var(--r-xl); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8), var(--shadow-glow);
  text-align: center; transform: translateY(20px); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.auth-overlay.show .auth-card { transform: translateY(0); }
.auth-icon {
  width: 80px; height: 80px; border-radius: 24px; background: var(--surface-active);
  border: 1px solid var(--border-accent); margin: 0 auto 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; color: var(--accent2); box-shadow: var(--shadow-glow);
}
.auth-title { font-family: var(--font-head); font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.auth-desc { color: var(--text2); font-size: 14px; margin-bottom: 32px; line-height: 1.6; }
.auth-btn-gh {
  width: 100%; padding: 14px; background: #fff; color: #000; border: none;
  border-radius: var(--r-md); font-weight: 700; font-size: 14px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  cursor: pointer; transition: all 0.2s ease; margin-bottom: 16px;
}
.auth-btn-gh:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
.auth-loading-spinner {
  width: 40px; height: 40px; border: 3px solid var(--surface-active);
  border-top-color: var(--accent); border-radius: 50%;
  margin: 0 auto 20px; animation: ringpulse 1s linear infinite;
}
.desktop-layout{display:flex;flex:1;overflow:hidden}
.glass{
  background:var(--surface);
  backdrop-filter:blur(16px) saturate(130%);
  -webkit-backdrop-filter:blur(16px) saturate(130%);
  border:1px solid var(--border);
  transition:border-color var(--t-norm);
}
.glass:hover{border-color:var(--border-accent)}

/* ─── SIDEBAR ─── */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:rgba(8,8,14,0.92);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  z-index:40;
  transition: width 200ms ease;
  position: relative;
  overflow-y: auto;
  overflow-x: hidden;
}
.sidebar.collapsed {
  width: 64px;
  min-width: 64px;
}
.sidebar.collapsed .logo-text,
.sidebar.collapsed .sb-sub,
.sidebar.collapsed .nav-label,
.sidebar.collapsed .nav-link span,
.sidebar.collapsed .user-name,
.sidebar.collapsed .user-online,
.sidebar.collapsed .sb-history-item,
.sidebar.collapsed .nav-link:not(:has(svg)),
.sidebar.collapsed .sb-footer div:last-child {
  display: none !important;
}

.sb-toggle-btn {
  position: absolute;
  right: -12px;
  top: 50%;
  transform: translateY(-50%);
  width: 24px;
  height: 24px;
  background: var(--surface-opaque);
  border: 1px solid var(--border-accent);
  border-radius: 50%;
  color: var(--text2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 50;
  transition: all var(--t-fast);
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}
.sb-toggle-btn:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.sidebar.collapsed .sb-toggle-btn i {
  transform: rotate(180deg);
}

.sidebar.collapsed .nav-link {
  justify-content: center;
  padding: 10px 0;
}
.sidebar.collapsed .sb-logo {
  padding: 18px 0;
  display: flex;
  justify-content: center;
}
.sidebar.collapsed .sb-logo-row {
  justify-content: center;
}
.sidebar.collapsed .user-row {
  justify-content: center;
  padding: 8px 0;
}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.sb-logo-row{display:flex;align-items:center;gap:10px}
.logo-gem{
  width:26px;height:26px;border-radius:7px;
  background:var(--accent-grad);box-shadow:var(--shadow-glow);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-head);font-weight:800;font-size:14px;color:#fff;
}
.logo-text{
  font-family:var(--font-head);font-size:15px;font-weight:700;letter-spacing:.1em;
  background:linear-gradient(to right,#fff,var(--text2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sb-sub{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.15em;font-weight:600;margin-top:5px}
.nav-group{padding:16px 12px 4px}
.nav-label{
  font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;
  padding:0 10px 7px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;
  user-select:none;
}
.nav-label i {
  transition: transform var(--t-fast);
  font-size: 10px;
}
.nav-group.collapsed .nav-label i {
  transform: rotate(-90deg);
}
.nav-group.collapsed > div:not(.nav-label),
.nav-group.collapsed > a {
  display: none !important;
}
.nav-link{
  display:flex;align-items:center;gap:11px;padding:9px 12px;
  border-radius:var(--r-md);color:var(--text2);font-size:13px;font-weight:500;
  cursor:pointer;text-decoration:none;transition:var(--t-fast);margin-bottom:3px;position:relative;
}
.nav-link:hover{background:var(--surface-hover);color:var(--text)}
.nav-link.active{background:var(--surface-active);color:var(--accent2);font-weight:600}
.nav-link.active::before{
  content:'';position:absolute;left:0;top:25%;height:50%;width:3px;
  background:var(--accent);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--accent);
}
.nav-link svg{width:17px;height:17px;stroke-width:1.8;flex-shrink:0;transition:transform var(--t-fast)}
.nav-link:hover svg{transform:translateX(2px)}
.nav-badge{
  margin-left:auto;font-family:var(--font-mono);font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:var(--r-full);background:var(--border2);color:var(--text2);
}
.nav-link.active .nav-badge{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(124,58,237,.4)}
.sb-repos{flex:1;overflow-y:auto;padding:0 12px 16px;max-height: 100%;}
.sb-repos::-webkit-scrollbar{width:2px}
.repo-item{
  display:flex;align-items:center;gap:9px;padding:7px 11px;
  border-radius:var(--r-sm);color:var(--text2);font-size:12.5px;cursor:pointer;
  transition:var(--t-fast);margin-bottom:2px;
}
.repo-item:hover{background:var(--surface-hover);color:var(--text)}
.repo-item.selected{background:rgba(255,255,255,0.035);color:var(--text);border-left:2px solid var(--accent);font-weight:500}
.repo-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);flex-shrink:0;position:relative}
.repo-item.selected .repo-dot{background:var(--accent);box-shadow:0 0 7px var(--accent)}
.repo-item.active-agent .repo-dot{background:var(--green)}
.repo-item.active-agent .repo-dot::after{
  content:'';position:absolute;top:-3px;left:-3px;width:13px;height:13px;
  border-radius:50%;border:1px solid var(--green);animation:ringpulse 1.8s infinite;
}
.repo-item.has-error .repo-dot{background:var(--red)}

/* ─── REPO GROUPS ─── */
.repo-group {
  margin-bottom: 8px;
}
.repo-group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: background var(--t-fast);
  user-select: none;
}
.repo-group-header:hover {
  background: var(--surface-hover);
}
.group-chevron {
  font-size: 10px;
  color: var(--text3);
  transition: transform var(--t-fast);
}
.repo-group.collapsed .group-chevron {
  transform: rotate(-90deg);
}
.group-name {
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sb-history-compact .repo-item span:last-child {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.group-count {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text3);
  background: rgba(255,255,255,0.05);
  padding: 1px 5px;
  border-radius: 4px;
}
.repo-group-content {
  margin-top: 4px;
  padding-left: 12px;
  border-left: 1px solid var(--border);
  margin-left: 12px;
  display: flex;
  flex-direction: column;
}
.repo-group.collapsed .repo-group-content {
  display: none;
}
.sidebar.collapsed .repo-group-header span,
.sidebar.collapsed .repo-group-header .group-count,
.sidebar.collapsed .repo-group-content {
  display: none !important;
}
.sidebar.collapsed .repo-group-header {
  justify-content: center;
  padding: 8px 0;
}
.repo-star{margin-left:auto;color:var(--amber);font-size:11px;opacity:.8}
.sb-footer{padding:14px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-md);cursor:pointer;transition:var(--t-fast)}
.user-row:hover{background:var(--surface-hover)}
.avatar{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:12px;color:#fff;flex-shrink:0;
}
.user-name{font-size:12.5px;font-weight:600;color:var(--text)}
.user-online{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--green);font-family:var(--font-mono)}
.u-dot{width:5px;height:5px;background:var(--green);border-radius:50%;box-shadow:0 0 5px var(--green)}

/* ─── MAIN ─── */
.main{flex:1;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}

/* ─── DESKTOP HEADER ─── */
.dheader{
  height:62px;min-height:62px;
  background:rgba(8,8,14,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 30px;position:sticky;top:0;z-index:30;
  gap: 20px;
}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);flex-shrink:0}
.breadcrumb .sep{color:var(--text3)}
.breadcrumb .cur{color:var(--text);font-weight:600}
.hactions{display:flex;align-items:center;gap:10px}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:8px 15px;border-radius:var(--r-md);font-family:var(--font-ui);
  font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;
  transition:all var(--t-fast);text-decoration:none;white-space:nowrap;
}
.btn-ghost{background:rgba(255,255,255,0.03);border-color:var(--border);color:var(--text2)}
.btn-ghost:hover{background:var(--surface-hover);color:var(--text);border-color:var(--border2)}
.btn-primary{background:var(--accent-grad);color:#fff;box-shadow:0 4px 14px rgba(124,58,237,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(124,58,237,.5)}
.btn-primary:active{transform:translateY(1px)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:var(--r-sm)}
.btn-claude{
  background:var(--claude-bg);border:1px solid var(--claude-border);color:var(--claude-text);
  padding:7px 14px;font-size:12.5px;font-weight:600;
  display:inline-flex;align-items:center;gap:7px;
  border-radius:var(--r-md);cursor:pointer;transition:all var(--t-fast);font-family:var(--font-ui);
}
.btn-claude:hover{
  background:rgba(180,130,255,0.14);border-color:rgba(180,130,255,0.5);
  box-shadow:0 0 18px rgba(160,100,255,0.2);color:#d4baff;
}
.claude-icon{
  width:18px;height:18px;border-radius:4px;
  background:linear-gradient(135deg,#c47bff,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#fff;flex-shrink:0;
}

/* ─── TOP NAV (hnav) ─── */
.hnav {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0, 0, 0, 0.2);
  padding: 4px;
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
}
.hnav-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: var(--r-md);
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: transparent;
  transition: all var(--t-fast);
  white-space: nowrap;
}
.hnav-link i {
  font-size: 14px;
  opacity: 0.7;
}
.hnav-link:hover {
  background: var(--surface-hover);
  color: var(--text);
}
.hnav-link.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
}
.hnav-link.active i {
  opacity: 1;
}

/* ─── SIDEBAR HISTORY ─── */
.sb-history-compact {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 0 4px;
}
.sb-history-item {
  display: flex;
  flex-direction: column;
  padding: 8px 10px;
  border-radius: var(--r-md);
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all var(--t-fast);
}
.sb-history-item:hover {
  border-color: var(--border-accent);
  background: var(--surface-hover);
}
.sb-history-item .h-task {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sb-history-item .h-meta {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: var(--text3);
  margin-top: 4px;
}

/* ─── CHAT HISTORY ─── */
.chat-history-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 11px;
  border-radius: var(--r-sm);
  color: var(--text2);
  font-size: 12.5px;
  cursor: pointer;
  transition: var(--t-fast);
  margin-bottom: 2px;
  position: relative;
}
.chat-history-item:hover {
  background: var(--surface-hover);
  color: var(--text);
}
.chat-history-item.active {
  background: rgba(124, 58, 237, 0.1);
  color: var(--text);
  border-left: 2px solid var(--accent);
  font-weight: 500;
}
.chat-history-item .chat-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--border2);
  flex-shrink: 0;
}
.chat-history-item.active .chat-dot {
  background: var(--accent);
  box-shadow: 0 0 7px var(--accent);
}
.chat-history-item .chat-title {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-history-item .btn-delete-session {
  opacity: 0;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--text3);
  background: transparent;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.chat-history-item:hover .btn-delete-session {
  opacity: 1;
}
.chat-history-item .btn-delete-session:hover {
  color: var(--red);
  background: var(--red-soft);
}
/* Mobile compatibility for delete button */
@media (max-width: 1024px) {
  .chat-history-item .btn-delete-session {
    opacity: 0.6;
  }
}

/* ─── SKELETON LOADING ─── */
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.skeleton {
  background: rgba(255, 255, 255, 0.05);
  background-image: linear-gradient(
    90deg,
    transparent 0%,
    rgba(255, 255, 255, 0.05) 50%,
    transparent 100%
  );
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite linear;
  border-radius: var(--r-sm);
  color: transparent !important;
  border: none !important;
  pointer-events: none;
  user-select: none;
}
.skeleton * {
  visibility: hidden !important;
}

.skeleton-text {
  height: 1em;
  width: 100%;
  display: inline-block;
  margin-bottom: 0.5em;
}

.skeleton-stat {
  height: 40px;
  width: 80px;
  margin-bottom: 8px;
}

/* ─── VIEW SWITCHER ─── */
.view{display:none}
.view.active{display:block}

/* ─── STATS ROW ─── */
.stats-row{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:10px;padding:12px;
}
.stat-tile{
  padding:14px;border-radius:var(--r-md);position:relative;overflow:hidden;
  height:120px;display:flex;flex-direction:column;justify-content:center;
}
.stat-tile::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:2px;
  background:transparent;transition:background var(--t-norm);
}
.stat-tile:hover::before{background:var(--accent-grad)}
.stat-tile.accent::before{background:var(--accent-grad)}
.stat-tile.accent{border-color:var(--border-accent);box-shadow:0 0 20px rgba(124,58,237,.08) inset}
.stat-num{font-family:var(--font-mono);font-size:36px;font-weight:700;color:var(--text);line-height:1;margin-bottom:4px}
.stat-lbl{font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.stat-delta{
  font-family:var(--font-mono);font-size:10px;font-weight:600;margin-top:5px;
  padding:2px 6px;border-radius:var(--r-full);display:inline-flex;align-items:center;gap:3px;
}
.delta-up{background:var(--green-soft);color:var(--green)}
.stat-icon{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  font-size:22px;opacity:.12;transition:var(--t-norm);pointer-events:none;
}
.stat-tile:hover .stat-icon{opacity:.35;transform:translateY(-50%) scale(1.1)}

/* ─── DASHBOARD GRID ─── */
.dash-grid{
  display:grid;grid-template-columns:1fr 1.6fr 1.1fr;
  gap:18px;padding:10px 30px 24px;align-items:start;
}
.card{border-radius:var(--r-xl);overflow:hidden;display:flex;flex-direction:column}
.card-head{
  padding:15px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card-title{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-head);font-size:12.5px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;color:var(--text);
}
.card-title svg{width:14px;height:14px;stroke-width:2;opacity:.7}
.card-body{padding:20px}

/* ─── COL 1: CONFIG ─── */
.cfg-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px}
.cfg-path{
  font-family:var(--font-mono);font-size:11px;color:var(--text2);
  background:rgba(0,0,0,.25);border:1px solid var(--border);
  padding:7px 11px;border-radius:var(--r-sm);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:14px;
}
.cfg-input{
  width:100%;background:rgba(0,0,0,.2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:8px 12px;color:var(--text);
  font-family:var(--font-ui);font-size:13px;transition:var(--t-fast);
}
.cfg-input:focus{border-color:var(--accent);box-shadow:0 0 10px rgba(124,58,237,.2)}
.sel-wrap{position:relative;margin-bottom:6px}
.sel-wrap select{
  width:100%;background:rgba(10,10,15,.85);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:8px 30px 8px 12px;color:var(--text);
  font-family:var(--font-ui);font-size:13px;cursor:pointer;appearance:none;transition:var(--t-fast);
}
.sel-wrap select:focus{border-color:var(--accent)}
.sel-wrap::after{
  content:'';position:absolute;right:11px;top:50%;transform:translateY(-50%);
  width:8px;height:5px;background:var(--text2);clip-path:polygon(0 0,100% 0,50% 100%);pointer-events:none;
}
.branch-meta{font-size:11px;color:var(--green);font-family:var(--font-mono);margin-top:5px;margin-bottom:14px;display:flex;align-items:center;gap:5px}
.mini-chart-box{margin-top:14px;background:rgba(0,0,0,.18);border:1px solid var(--border);border-radius:var(--r-md);padding:12px}
.mini-chart-title{font-size:10px;font-weight:600;color:var(--text2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em}
.svg-chart{width:100%;height:56px}

/* ─── COL 2: SESSION ─── */
.session-card{border:1px solid var(--border);background:var(--surface);border-radius:var(--r-xl);overflow:hidden}
.prompt-area{
  width:100%;min-height:130px;padding:18px 20px;
  background:rgba(0,0,0,.18);border:none;border-bottom:1px solid var(--border);
  color:var(--text);font-family:var(--font-ui);font-size:13.5px;line-height:1.6;
  resize:vertical;transition:border-color var(--t-fast);
}
.prompt-area:focus{background:rgba(0,0,0,.28);border-bottom-color:var(--accent)}
.prompt-area::placeholder{color:var(--text3)}
.opts-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:7px;
  padding:14px 18px;background:rgba(0,0,0,.08);border-bottom:1px solid var(--border);
}
.opt-pill{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-radius:var(--r-md);border:1px solid var(--border);
  background:rgba(255,255,255,.02);color:var(--text2);cursor:pointer;
  font-size:12px;font-weight:500;transition:var(--t-fast);user-select:none;
}
.opt-pill:hover{border-color:var(--accent2);color:var(--text)}
.opt-pill.active{background:var(--surface-active);border-color:var(--accent);color:var(--accent2)}
.opt-pill svg{width:13px;height:13px;stroke-width:2;flex-shrink:0}
.session-foot{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.meta-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  padding:4px 10px;border-radius:var(--r-full);font-size:11px;color:var(--text2);
}
.meta-tag svg{width:11px;height:11px;color:var(--accent)}

/* ─── COL 3: TELEMETRY ─── */
.tel-box{
  background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--r-md);
  padding:12px;height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;
}
.tel-line{display:flex;flex-direction:column;line-height:1.45;border-left:2px solid transparent;padding-left:7px}
.tel-line.info{border-color:var(--accent)}
.tel-line.success{border-color:var(--green)}
.tel-line.warn{border-color:var(--amber)}
.tel-line.error{border-color:var(--red)}
.tel-head{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.tel-time{color:var(--text3);font-size:10px}
.tel-tag{font-weight:700;font-size:9px;text-transform:uppercase;padding:1px 4px;border-radius:3px}
.tel-tag.info{background:rgba(124,58,237,.15);color:var(--accent2)}
.tel-tag.success{background:var(--green-soft);color:var(--green)}
.tel-tag.warn{background:var(--amber-soft);color:var(--amber)}
.tel-tag.error{background:var(--red-soft);color:var(--red)}
.tel-msg{color:var(--text2);font-family:var(--font-mono);font-size:11px}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--green);font-family:var(--font-mono)}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);position:relative}
.live-dot::after{content:'';position:absolute;top:-3px;left:-3px;width:12px;height:12px;border-radius:50%;border:1px solid var(--green);animation:ringpulse 1.5s infinite}

/* ─── TABLE ─── */
.table-card{grid-column:1/-1}
.filter-bar{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:14px 18px;border-bottom:1px solid var(--border);
  background:rgba(0,0,0,.07);flex-wrap:wrap;
}
.search-wrap{position:relative;flex:1;max-width:340px;min-width:180px}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);width:13px;height:13px}
.search-in{
  width:100%;background:rgba(0,0,0,.2);border:1px solid var(--border);
  border-radius:var(--r-md);padding:7px 12px 7px 34px;color:var(--text);font-size:13px;transition:var(--t-fast);
}
.search-in:focus{border-color:var(--accent);background:rgba(0,0,0,.3)}
.filter-pills{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.fpill{
  padding:5px 11px;border-radius:var(--r-full);font-size:11.5px;font-weight:500;
  color:var(--text2);border:1px solid var(--border);cursor:pointer;
  background:rgba(255,255,255,.01);transition:var(--t-fast);
}
.fpill:hover{border-color:var(--border2);color:var(--text)}
.fpill.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 10px rgba(124,58,237,.4)}
.tbl-wrap{width:100%;overflow-x:auto}
.stbl{width:100%;border-collapse:collapse;text-align:left}
.stbl th{
  padding:13px 18px;font-size:10.5px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);background:rgba(0,0,0,.04);
}
.stbl td{padding:13px 18px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;transition:var(--t-fast)}
.stbl tr{cursor:pointer}
.stbl tr:last-child td{border-bottom:none}
.stbl tr.selected td { background: rgba(124, 58, 237, 0.08); border-bottom-color: var(--accent); }
.stbl tr.active-row td { background: rgba(255, 255, 255, 0.05); }
.sb-history-item.selected { background: rgba(124, 58, 237, 0.12); border-color: var(--accent); }
.stbl tr:hover td{background:rgba(255,255,255,.02)}
.sid{
  font-family:var(--font-mono);font-size:11px;color:var(--accent2);
  background:rgba(139,92,246,.1);padding:2px 6px;border-radius:4px;border:1px solid rgba(139,92,246,.2);
}
.tdesc{font-weight:500;color:var(--text);max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tmono{font-family:var(--font-mono);font-size:11.5px;color:var(--text2)}
.sbadge{
  display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;
  padding:4px 9px;border-radius:var(--r-full);font-family:var(--font-mono);text-transform:uppercase;
}
.sbadge.running{background:var(--green-soft);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.sbadge.done{background:rgba(255,255,255,.03);color:var(--text2);border:1px solid var(--border)}
.sbadge.error{background:var(--red-soft);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.sbadge.pending{background:var(--amber-soft);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.pulse-dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.sbadge.running .pulse-dot{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 1.5s infinite}

/* ─── KANBAN VIEW ─── */
#view-kanban{padding:22px 30px}
.kanban-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.kanban-title{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--text)}
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}
.kb-col{border-radius:var(--r-lg);overflow:hidden;background:rgba(255,255,255,.02);border:1px solid var(--border);transition:border-color var(--t-norm)}
.kb-col.drag-over{border-color:var(--accent);background:rgba(124,58,237,.04)}
.kb-col-head{
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.kb-col-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:8px}
.kb-col-name .col-dot{width:8px;height:8px;border-radius:50%}
.kb-count{
  font-family:var(--font-mono);font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:var(--r-full);background:rgba(255,255,255,.06);color:var(--text2);
}
.kb-cards{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:100px}
.kb-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-md);padding:13px 14px;cursor:grab;
  transition:all var(--t-fast);position:relative;overflow:hidden;
}
.kb-card:active{cursor:grabbing}
.kb-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kb-card.running::before{background:var(--green)}
.kb-card.pending::before{background:var(--amber)}
.kb-card.done::before{background:var(--accent)}
.kb-card.error::before{background:var(--red)}
.kb-card.archived{opacity:0.6;filter:grayscale(0.3)}
.kb-card:hover{border-color:var(--border-accent);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.4)}
.kb-card.dragging{opacity:.4;transform:scale(.97)}
.archived-badge{
  font-size:8px;font-weight:800;color:var(--green);background:var(--green-soft);
  padding:1px 5px;border-radius:4px;text-transform:uppercase;letter-spacing:0.05em;
  border:1px solid rgba(16,185,129,0.2);margin-left:6px;
}
.btn-relaunch{
  background:rgba(124,58,237,0.1) !important;
  color:var(--accent2) !important;
  border-color:rgba(124,58,237,0.2) !important;
}
.btn-relaunch:hover{
  background:rgba(124,58,237,0.2) !important;
  border-color:var(--accent) !important;
  color:#fff !important;
}
.kb-card-id{font-family:var(--font-mono);font-size:10px;color:var(--text3);margin-bottom:5px}
.kb-card-task{font-size:12.5px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.kb-card-meta{display:flex;align-items:center;justify-content:space-between;gap:8px}
.kb-card-repo{font-family:var(--font-mono);font-size:10px;color:var(--text2);background:rgba(255,255,255,.04);border:1px solid var(--border);padding:2px 7px;border-radius:var(--r-full)}
.kb-card-time{font-family:var(--font-mono);font-size:10px;color:var(--text3)}
.kb-card-actions{display:flex;gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.kb-action-btn{
  flex:1;padding:4px 6px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:rgba(255,255,255,.02);color:var(--text3);font-size:10px;font-weight:600;
  cursor:pointer;transition:var(--t-fast);font-family:var(--font-ui);text-align:center;
}
.kb-action-btn:hover{background:var(--surface-hover);color:var(--text);border-color:var(--border2)}
.kb-action-btn.danger:hover{background:var(--red-soft);color:var(--red);border-color:rgba(239,68,68,.3)}
.kb-add{
  margin:8px 10px 10px;padding:8px;border:1px dashed var(--border);border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;gap:7px;
  color:var(--text3);font-size:12px;cursor:pointer;transition:var(--t-fast);
}
.kb-add:hover{border-color:var(--accent);color:var(--accent2);background:var(--surface-active)}

/* ─── METRICS VIEW ─── */
#view-metrics{padding:22px 30px}
.metrics-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.metrics-title{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--text)}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.metric-card{border-radius:var(--r-xl);overflow:hidden}
.metric-card-full{grid-column:1/-1}
.chart-container{position:relative;height:160px;padding:16px 20px 8px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:100%;width:100%}
.bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{
  width:100%;border-radius:4px 4px 0 0;
  transition:height .6s cubic-bezier(.34,1.56,.64,1);position:relative;min-height:4px;
}
.bar.success-bar{background:linear-gradient(to top,var(--green),rgba(16,185,129,.4))}
.bar.error-bar{background:linear-gradient(to top,var(--red),rgba(239,68,68,.4))}
.bar.token-bar{background:linear-gradient(to top,var(--accent),rgba(124,58,237,.4))}
.bar.time-bar{background:linear-gradient(to top,var(--cyan),rgba(6,182,212,.4))}
.bar-label{font-family:var(--font-mono);font-size:9px;color:var(--text3);text-align:center}
.donut-wrap{display:flex;justify-content:center;align-items:center;padding:16px;gap:20px}
.donut-svg{width:120px;height:120px;transform:rotate(-90deg)}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-val{font-family:var(--font-mono);font-weight:600;color:var(--text);margin-left:auto}
.metric-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}
.metric-stat{background:var(--surface-opaque);padding:14px 18px;text-align:center}
.metric-stat-num{font-family:var(--font-mono);font-size:22px;font-weight:600;color:var(--text);display:block}
.metric-stat-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:3px;display:block}
.timeline-wrap{padding:16px 20px}
.timeline-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.timeline-row:last-child{border-bottom:none}
.tl-time{font-family:var(--font-mono);font-size:10px;color:var(--text3);width:50px;flex-shrink:0}
.tl-bar-outer{flex:1;height:8px;background:rgba(255,255,255,.04);border-radius:var(--r-full);overflow:hidden}
.tl-bar-inner{height:100%;border-radius:var(--r-full);transition:width .8s cubic-bezier(.34,1.56,.64,1)}
.tl-val{font-family:var(--font-mono);font-size:10px;color:var(--text2);width:40px;text-align:right;flex-shrink:0}

/* ─── DIFF VIEWER ─── */
.diff-viewer{font-family:var(--font-mono);font-size:11.5px;line-height:1.7;overflow-x:auto}
.diff-file-header{
  background:rgba(0,0,0,.4);border:1px solid var(--border);
  padding:8px 14px;border-radius:var(--r-sm) var(--r-sm) 0 0;
  display:flex;align-items:center;gap:8px;color:var(--text2);font-size:11px;
  border-bottom:none;
}
.diff-file-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase}
.diff-file-badge.modified{background:var(--amber-soft);color:var(--amber)}
.diff-file-badge.added{background:var(--green-soft);color:var(--green)}
.diff-file-badge.deleted{background:var(--red-soft);color:var(--red)}
.diff-body{
  background:rgba(0,0,0,.3);border:1px solid var(--border);
  border-radius:0 0 var(--r-sm) var(--r-sm);overflow:hidden;margin-bottom:12px;
}
.diff-line{display:flex;align-items:stretch;min-height:22px}
.diff-line:hover{background:rgba(255,255,255,.02)}
.diff-ln{
  width:36px;min-width:36px;text-align:right;padding:0 8px;
  font-size:10px;color:var(--text3);user-select:none;
  border-right:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;
}
.diff-sign{
  width:20px;min-width:20px;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:12px;flex-shrink:0;
}
.diff-code{padding:0 10px;flex:1;white-space:pre;display:flex;align-items:center;font-size:11px}
.diff-line.add{background:rgba(16,185,129,.06)}
.diff-line.add .diff-sign{color:var(--green)}
.diff-line.add .diff-code{color:#6ee7b7}
.diff-line.del{background:rgba(239,68,68,.06)}
.diff-line.del .diff-sign{color:var(--red)}
.diff-line.del .diff-code{color:#fca5a5;text-decoration:line-through;opacity:.7}
.diff-line.ctx .diff-sign{color:var(--text3)}
.diff-line.ctx .diff-code{color:var(--text2)}
.diff-line.hunk{background:var(--cyan-soft)}
.diff-line.hunk .diff-code{color:var(--cyan);font-style:italic;font-size:10px}
.diff-stats{display:flex;gap:12px;font-size:11px;margin-bottom:12px;font-family:var(--font-mono)}
.diff-stat-add{color:var(--green)}
.diff-stat-del{color:var(--red)}

/* ─── NOTIFICATION SYSTEM ─── */
.notif-bell{
  position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:var(--r-md);
  border:1px solid var(--border);background:rgba(255,255,255,.02);
  transition:var(--t-fast);
}
.notif-bell:hover{background:var(--surface-hover);border-color:var(--border2)}
.notif-bell svg{width:16px;height:16px;color:var(--text2)}
.notif-pip{
  position:absolute;top:-3px;right:-3px;
  width:14px;height:14px;border-radius:50%;
  background:var(--red);border:2px solid var(--bg);
  font-size:8px;font-weight:800;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);
  animation:notif-pop .3s cubic-bezier(.34,1.56,.64,1);
}
.notif-pip.hidden{display:none}
@keyframes notif-pop{from{transform:scale(0)}to{transform:scale(1)}}
.notif-panel{
  position:fixed;top:70px;right:16px;width:340px;z-index:200;
  border-radius:var(--r-xl);overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
  transform:translateY(-8px) scale(.97);opacity:0;pointer-events:none;
  transition:all var(--t-norm);
}
.notif-panel.open{transform:translateY(0) scale(1);opacity:1;pointer-events:auto}
.notif-panel-head{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,.2);
}
.notif-panel-title{font-size:13px;font-weight:700;color:var(--text)}
.notif-clear{font-size:11px;color:var(--accent2);cursor:pointer;transition:var(--t-fast)}
.notif-clear:hover{color:var(--text)}
.notif-list{max-height:380px;overflow-y:auto}
.notif-item{
  padding:12px 18px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:var(--t-fast);display:flex;gap:10px;
}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:var(--surface-hover)}
