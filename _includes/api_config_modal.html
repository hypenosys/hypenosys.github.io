<!-- AI API Configuration Modal -->
<div class="modal fade" id="modalApiConfig" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content shadow-lg bg-dark text-white border-purple">
            <div class="modal-header border-purple bg-black-transparent">
                <h5 class="modal-title text-purple font-weight-bold d-flex align-items-center">
                    <i class="fas fa-robot mr-3"></i>
                    <span>CONFIGURACIÓN API</span>
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body p-4">
                <div class="alert alert-warning bg-black border-warning text-warning small mb-4" style="background: rgba(255, 193, 7, 0.05); border: 1px solid #ffc107;">
                    <i class="fas fa-exclamation-triangle mr-2"></i>
                    Tu API key se guarda solo en este navegador. Nunca se sube a GitHub.
                </div>

                <div class="form-group">
                    <label class="text-purple small font-weight-bold uppercase">Proveedor de IA</label>
                    <select id="api-config-provider" class="form-control bg-dark text-white border-purple" onchange="window.apiConfigUI.handleProviderChange()">
                        <option value="none">Ninguno</option>
                        <option value="anthropic">Anthropic (Claude)</option>
                        <option value="openai">OpenAI (ChatGPT)</option>
                        <option value="gemini">Google Gemini</option>
                        <option value="mistral">Mistral AI</option>
                        <option value="openrouter">OpenRouter</option>
                        <option value="ollama">Ollama (Local)</option>
                        <option value="custom">Custom (OpenAI API Compatible)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="text-purple small font-weight-bold uppercase">Modelo</label>
                    <input type="text" id="api-config-model" class="form-control bg-dark text-white border-purple" placeholder="Selecciona un proveedor">
                </div>

                <div class="form-group">
                    <label class="text-purple small font-weight-bold uppercase">API Key</label>
                    <div class="input-group">
                        <input type="password" id="api-config-key" class="form-control bg-dark text-white border-purple" placeholder="sk-...">
                        <div class="input-group-append">
                            <button class="btn btn-outline-purple" type="button" onclick="window.apiConfigUI.toggleKeyVisibility()">
                                <i class="fas fa-eye" id="api-config-key-icon"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="form-group" id="api-config-base-url-container" style="display: none;">
                    <label class="text-purple small font-weight-bold uppercase">Base URL</label>
                    <input type="text" id="api-config-base-url" class="form-control bg-dark text-white border-purple" placeholder="http://localhost:11434/v1">
                </div>
            </div>
            <div class="modal-footer border-purple">
                <button type="button" class="btn btn-outline-secondary px-4" data-dismiss="modal">Cancelar</button>
                <button type="button" id="btn-save-api-config" class="btn btn-purple px-5 shadow-lg">
                    <i class="fas fa-save mr-2"></i> Guardar Configuración
                </button>
            </div>
        </div>
    </div>
</div>

<script>
window.apiConfigUI = {
    placeholders: {
        'anthropic': 'claude-sonnet-4-6-20260217',
        'openai': 'gpt-5',
        'gemini': 'gemini-2.5-flash',
        'mistral': 'mistral-large-latest',
        'openrouter': 'openrouter/auto',
        'ollama': 'llama3',
        'custom': '',
        'none': 'Selecciona un proveedor'
    },
    handleProviderChange() {
        const provider = document.getElementById('api-config-provider').value;
        const modelInput = document.getElementById('api-config-model');
        const baseUrlContainer = document.getElementById('api-config-base-url-container');
        const baseUrlInput = document.getElementById('api-config-base-url');

        modelInput.placeholder = this.placeholders[provider] || '';

        if (provider === 'ollama' || provider === 'custom') {
            baseUrlContainer.style.display = 'block';
            if (provider === 'ollama' && !baseUrlInput.value) {
                baseUrlInput.value = 'http://localhost:11434/v1';
            }
        } else {
            baseUrlContainer.style.display = 'none';
        }
    },
    toggleKeyVisibility() {
        const input = document.getElementById('api-config-key');
        const icon = document.getElementById('api-config-key-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
};
</script>
