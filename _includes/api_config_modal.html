<!-- Modal Configuración API -->
<div class="modal fade" id="modalApiConfig" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content shadow-lg bg-dark text-white border-purple">
            <div class="modal-header border-purple">
                <h5 class="modal-title text-purple font-weight-bold">
                    <i class="fas fa-key mr-2"></i> CONFIGURACIÓN API DE IA
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="alert alert-warning bg-black border-warning text-warning small mb-4" style="border-width: 2px;">
                    <i class="fas fa-exclamation-triangle mr-2"></i>
                    Tu API key se guarda solo en este navegador. Nunca se sube a GitHub.
                </div>

                <div class="form-group">
                    <label for="ai_provider" class="text-gray-400 small font-weight-bold uppercase">Proveedor de IA</label>
                    <select id="ai_provider" class="form-control bg-dark text-white border-purple" onchange="window.authManager.handleProviderChange()">
                        <option value="none">Ninguno</option>
                        <option value="anthropic">Anthropic (Claude)</option>
                        <option value="openai">OpenAI (ChatGPT)</option>
                        <option value="gemini">Google Gemini</option>
                        <option value="mistral">Mistral AI</option>
                        <option value="openrouter">OpenRouter</option>
                        <option value="ollama">Ollama (Local)</option>
                        <option value="custom">Custom (OpenAI Compatible)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="ai_model" class="text-gray-400 small font-weight-bold uppercase">Modelo</label>
                    <input type="text" id="ai_model" class="form-control bg-dark text-white border-purple" placeholder="Selecciona un proveedor">
                </div>

                <div class="form-group">
                    <label for="ai_api_key" class="text-gray-400 small font-weight-bold uppercase">API Key</label>
                    <div class="input-group">
                        <input type="password" id="ai_api_key" class="form-control bg-dark text-white border-purple" placeholder="sk-...">
                        <div class="input-group-append">
                            <button class="btn btn-outline-purple" type="button" onclick="togglePasswordVisibility('ai_api_key')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="group-base-url" class="form-group" style="display: none;">
                    <label for="ai_base_url" class="text-gray-400 small font-weight-bold uppercase">Base URL / Endpoint</label>
                    <div class="input-group">
                        <input type="text" id="ai_base_url" class="form-control bg-dark text-white border-purple" placeholder="http://localhost:11434">
                        <div id="ollama-scan-btn-group" class="input-group-append" style="display: none;">
                            <button id="btn-scan-ollama" class="btn btn-outline-purple" type="button" onclick="window.ollamaUI.startScan()">
                                <i class="fas fa-search"></i> BUSCAR
                            </button>
                        </div>
                    </div>
                    <div id="ollama-scan-status" class="small mt-1 text-gray-500" style="display: none;"></div>
                </div>

                <div id="group-ollama-discovery" style="display: none;">
                    <div class="form-group">
                        <label for="ollama-scan-range" class="text-gray-400 small font-weight-bold uppercase">Rango de Búsqueda (Opcional)</label>
                        <input type="text" id="ollama-scan-range" class="form-control form-control-sm bg-dark text-white border-purple" placeholder="localhost, 192.168.1.0/24">
                    </div>
                    <div id="group-ollama-endpoints" class="form-group" style="display: none;">
                        <label for="ollama-endpoints-select" class="text-gray-400 small font-weight-bold uppercase">Endpoints Detectados</label>
                        <select id="ollama-endpoints-select" class="form-control form-control-sm bg-dark text-white border-purple" onchange="window.ollamaUI.selectEndpoint(this.value)">
                        </select>
                    </div>
                </div>

                <div id="group-ollama-models" class="form-group" style="display: none;">
                    <label class="text-gray-400 small font-weight-bold uppercase">Modelos de Ollama</label>
                    <div class="input-group">
                        <select id="ollama-models-select" class="form-control bg-dark text-white border-purple" onchange="document.getElementById('ai_model').value = this.value">
                            <option value="">Carga modelos primero...</option>
                        </select>
                        <div class="input-group-append">
                            <button class="btn btn-outline-purple" type="button" onclick="window.ollamaUI.refreshModels()">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="form-group mb-0">
                    <div class="custom-control custom-checkbox">
                        <input type="checkbox" class="custom-control-input" id="ai_local_network">
                        <label class="custom-control-label text-gray-400 small" for="ai_local_network" style="cursor:pointer">
                            Estoy en la red local (desactivar validación HTTPS)
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-purple">
                <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">Cancelar</button>
                <button type="button" id="btn-save-api-config" class="btn btn-purple">Guardar Configuración</button>
            </div>
        </div>
    </div>
</div>
