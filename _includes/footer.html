<footer class="py-5 bg-dark border-top border-purple mt-5">
  <div class="container text-center">
    <p class="h3 mb-4 text-purple font-weight-bold">{{ site.title | upcase }}</p>
    <p class="text-muted mb-4">{{ site.description }}</p>

    <div class="mb-4">
      <a href="{{ site.github.repository_url }}" class="btn btn-outline-purple btn-sm">
        <i class="fab fa-github"></i> Repository
      </a>
    </div>

    <div class="small text-muted">
      <p>&copy; {{ "now" | date: "%Y" }} Hypenosys Indie Studio. Built with passion and lots of coffee.</p>
    </div>
  </div>
</footer>
