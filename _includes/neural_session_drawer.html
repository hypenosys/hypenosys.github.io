<!-- Neural Session Drawer -->
<div id="neural-drawer-overlay" class="neural-drawer-overlay" onclick="window.neuralSession?.close()"></div>
<aside id="neural-drawer" class="neural-drawer">
    <!-- Header -->
    <div class="neural-drawer-header">
        <div class="flex flex-col">
            <span class="text-[10px] font-bold text-[#bd93f9] uppercase tracking-widest">Neural Session</span>
            <h3 id="nd-task-title" class="text-lg font-bold text-white truncate">Cargando tarea...</h3>
        </div>
        <button onclick="window.neuralSession?.close()" class="text-slate-400 hover:text-white transition-all text-xl">&times;</button>
    </div>

    <!-- Metadata Bar -->
    <div class="neural-drawer-metadata grid grid-cols-3 gap-2 px-6 py-3 border-b border-[#44475a] bg-[#1e1f29]">
        <div class="flex flex-col">
            <span class="text-[9px] text-slate-500 uppercase font-black">Repositorio</span>
            <span id="nd-task-repo" class="text-[11px] text-slate-300 truncate">---</span>
        </div>
        <div class="flex flex-col">
            <span class="text-[9px] text-slate-500 uppercase font-black">Rama</span>
            <span id="nd-task-branch" class="text-[11px] text-[#bd93f9] font-mono truncate">---</span>
        </div>
        <div class="flex flex-col">
            <span class="text-[9px] text-slate-500 uppercase font-black">Estimación</span>
            <span id="nd-task-hours" class="text-[11px] text-slate-300">---</span>
        </div>
    </div>

    <!-- Body -->
    <div class="neural-drawer-body flex-grow overflow-y-auto custom-scrollbar p-6 space-y-6">
        <!-- Suggested Prompt Section -->
        <div class="space-y-2">
            <label class="text-[10px] font-bold text-[#bd93f9] uppercase tracking-widest">Jules Prompt Suggestion</label>
            <textarea id="nd-prompt-area" rows="6"
                      class="w-full bg-[#1e1f29] border border-[#44475a] rounded-xl p-4 text-sm text-white focus:border-[#bd93f9] outline-none transition-all resize-none custom-scrollbar"
                      placeholder="Redactando sugerencia neural..."></textarea>
            <div class="flex gap-2">
                <button id="nd-refine-btn" onclick="window.neuralSession?.refineWithClaude()"
                        class="flex-1 py-2 bg-[#44475a] hover:bg-[#6272a4] text-white text-[10px] font-bold rounded-lg border border-[#6272a4] transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-magic"></i> REFINAR CON CLAUDE
                </button>
                <button id="nd-send-jules-btn" onclick="window.neuralSession?.sendToJules()"
                        class="flex-1 py-2 bg-[#bd93f9] hover:bg-[#a78bfa] text-[#282a36] text-[10px] font-bold rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg">
                    <i class="fas fa-bolt"></i> ENVIAR A JULES
                </button>
            </div>
        </div>

        <!-- Live Activity Log -->
        <div class="space-y-2">
            <div class="flex justify-between items-center">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Jules Activity Log</label>
                <span id="nd-polling-status" class="text-[9px] text-[#50fa7b] font-mono animate-pulse hidden">● POLLING</span>
            </div>
            <div id="nd-log-area" class="w-full h-48 bg-[#0d0d14] border border-[#44475a] rounded-xl p-4 font-mono text-[11px] overflow-y-auto custom-scrollbar flex flex-col gap-1 text-slate-400">
                <div class="opacity-30 italic">Sin actividad detectada</div>
            </div>
        </div>
    </div>

    <!-- Footer Input Area -->
    <div class="neural-drawer-footer p-6 border-t border-[#44475a] bg-[#1e1f29]">
        <div class="flex flex-col gap-3">
            <div class="flex justify-between items-center px-1">
                <div class="flex gap-2 bg-[#0d0d14] p-1 rounded-lg border border-[#44475a]">
                    <button id="mode-claude" onclick="window.neuralSession?.setMode('claude')" class="px-3 py-1 text-[9px] font-black rounded-md transition-all bg-[#bd93f9] text-[#282a36]">CLAUDE</button>
                    <button id="mode-jules" onclick="window.neuralSession?.setMode('jules')" class="px-3 py-1 text-[9px] font-black rounded-md transition-all text-slate-500 hover:text-white">JULES</button>
                </div>
                <span id="nd-mode-indicator" class="text-[9px] font-bold text-[#bd93f9] uppercase tracking-tighter">Claude Response Mode</span>
            </div>
            <div class="relative">
                <textarea id="nd-chat-input" rows="1" placeholder="Pregunta a Claude sobre esta tarea..."
                          class="w-full bg-[#282a36] border border-[#44475a] rounded-xl py-3 pl-4 pr-12 text-sm text-white focus:border-[#bd93f9] outline-none transition-all resize-none custom-scrollbar"></textarea>
                <button id="nd-chat-send" onclick="window.neuralSession?.handleChatSend()"
                        class="absolute right-2 top-2 w-8 h-8 rounded-lg bg-[#bd93f9] text-[#282a36] flex items-center justify-center hover:opacity-90 transition-all">
                    <i class="fas fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>
    </div>
</aside>

<style>
    .neural-drawer {
        position: fixed;
        top: 0;
        right: -450px;
        width: 450px;
        height: 100%;
        background: #282a36;
        box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        z-index: 1001;
        display: flex;
        flex-direction: column;
        transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        border-left: 1px solid #44475a;
    }
    .neural-drawer.open {
        right: 0;
    }
    .neural-drawer-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
    }
    .neural-drawer-overlay.open {
        opacity: 1;
        pointer-events: auto;
    }
    .neural-drawer-header {
        padding: 24px;
        border-bottom: 1px solid #44475a;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .nd-log-line {
        padding-left: 10px;
        border-left: 2px solid transparent;
    }
    .nd-log-line.info { border-color: #bd93f9; }
    .nd-log-line.success { border-color: #50fa7b; }
    .nd-log-line.error { border-color: #ff5555; }
    .nd-log-line.warn { border-color: #f1fa8c; }

    @media (max-width: 768px) {
        .neural-drawer {
            width: 100%;
            right: -100%;
        }
    }
</style>
