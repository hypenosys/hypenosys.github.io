<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a class="navbar-brand font-weight-bold text-purple" rel="author" href="{{ "/" | relative_url }}">
      <span style="letter-spacing: 2px;">{{ site.title | upcase }}</span>
    </a>

    {%- assign page_paths = site.header_pages -%}
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
      aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ml-auto">
        {%- for path in page_paths -%}
          {%- assign my_page = site.pages | where: "path", path | first -%}
          {%- if my_page.title -%}
          <li class="nav-item">
            <a class="nav-link" href="{{ my_page.url | relative_url }}">{{ my_page.title | escape }}</a>
          </li>
          {%- endif -%}
        {% endfor -%}
        <li class="nav-item">
          <a class="nav-link" href="{{ '/tech-stack/' | relative_url }}">Tech Stack</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ '/jules-panel/' | relative_url }}">Jules</a>
        </li>
      </ul>
      <ul class="navbar-nav ml-auto" id="auth-nav-container">
        <!-- Auth status injected here by auth.js -->
      </ul>
    </div>
  </div>
</nav>
