<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

    #claude-main-interface {
        font-family: 'Inter', sans-serif;
        background-color: #282a36;
        color: #f8f8f2;
    }
    .dracula-bg { background-color: #282a36; }
    .dracula-surface { background-color: #44475a; }
    .dracula-purple { color: #bd93f9; }
    .dracula-cyan { color: #8be9fd; }
    .dracula-green { color: #50fa7b; }
    .dracula-pink { color: #ff79c6; }

    .chat-container { height: 100%; overflow-y: auto; }
    .sidebar {
        background-color: #1e1f29;
        border-right: 1px solid rgba(189, 147, 249, 0.1);
        width: 260px;
        transition: width 0.25s ease;
        position: relative;
        overflow-x: hidden;
        overflow-y: auto;
    }
    .sidebar.collapsed {
        width: 48px;
    }
    .sidebar.collapsed .sidebar-text,
    .sidebar.collapsed .nav-label {
        display: none;
    }
    .sidebar-accent-border {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 1px;
        background: linear-gradient(to bottom, transparent, rgba(189, 147, 249, 0.3), transparent);
    }
    .message-user {
        background: #44475a;
        border-radius: 18px 18px 4px 18px;
        border: 1px solid rgba(139, 233, 253, 0.2);
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .message-claude {
        background: linear-gradient(135deg, #1e1f29 0%, #282a36 100%);
        border-radius: 18px 18px 18px 4px;
        border: 1px solid rgba(189, 147, 249, 0.3);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .thinking-block {
        border-left: 2px solid #6272a4;
        background: rgba(98, 114, 164, 0.1);
        padding: 8px 12px;
        margin-bottom: 12px;
        font-size: 0.85rem;
        color: #6272a4;
        font-style: italic;
    }

    /* Custom scrollbar for chat */
    .chat-container::-webkit-scrollbar { width: 6px; }
    .chat-container::-webkit-scrollbar-track { background: transparent; }
    .chat-container::-webkit-scrollbar-thumb { background: #44475a; border-radius: 10px; }
    .chat-container::-webkit-scrollbar-thumb:hover { background: #6272a4; }

    #claude-main-interface pre {
        background: #1e1f29;
        padding: 12px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 8px 0;
        border: 1px solid #44475a;
    }
    #claude-main-interface code {
        font-family: 'JetBrains Mono', monospace;
        color: #50fa7b;
    }

    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }

    /* Thinking Animation */
    .thinking-dots span {
        animation: thinking-dots 1.4s infinite both;
        display: inline-block;
        font-size: 1.5rem;
        line-height: 1;
        margin: 0 1px;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes thinking-dots {
        0% { opacity: 0.2; transform: scale(0.8); }
        20% { opacity: 1; transform: scale(1.1); }
        100% { opacity: 0.2; transform: scale(0.8); }
    }

    .message-bubble {
        transition: all 0.3s ease;
        position: relative;
    }
    .message-bubble:hover .message-actions {
        opacity: 1;
    }
    .neural-message-actions {
        opacity: 0;
        transition: opacity 0.15s ease, transform 0.15s ease;
        transform: translateY(5px);
    }
    .message-bubble:hover .neural-message-actions {
        opacity: 1;
        transform: translateY(0);
    }
    .neural-action-mini {
        height: 22px;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 9px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        background: #1e1f29;
        border: 1px solid #44475a;
        color: #6272a4;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.2s;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .neural-action-mini:hover {
        border-color: #bd93f9;
        color: #fff;
        background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
    }
    @media (hover: none) {
        .neural-message-actions {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .sidebar-section-label {
        font-size: 10px;
        font-weight: 700;
        color: #bd93f9;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        padding: 0 12px;
        margin-top: 16px;
        margin-bottom: 8px;
        white-space: nowrap;
    }

    .collapsed .sidebar-section-label {
        display: none;
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
        header {
            gap: 10px;
        }
        #session-title {
            font-size: 13px;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #profile-selector-container {
            display: block;
        }
        #active-profile-btn span {
            font-size: 8px;
            max-width: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #profile-dropdown {
            position: fixed;
            top: auto;
            bottom: 0;
            left: 0;
            width: 100%;
            height: auto;
            max-height: 70vh;
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: block !important;
            visibility: hidden;
        }
        #profile-dropdown.open {
            transform: translateY(0);
            visibility: visible;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 50;
            width: 280px;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #1e1f29;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar.open {
            transform: translateX(0);
        }
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 40;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }
        #claude-main-interface {
            flex-direction: column;
            border-radius: 0;
            border: none;
            height: 100vh;
            width: 100vw;
            max-width: 100%;
            overflow: visible !important;
        }
        main {
            width: 100% !important;
            flex-grow: 1;
            overflow-x: hidden;
        }
        header {
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }
        .mobile-toggle {
            display: flex !important;
        }
        #connection-status span:not(.w-1.5) {
            display: none;
        }
        #connection-status {
            padding: 4px;
            min-width: 24px;
            justify-content: center;
        }
    }

    /* Tablet and Mobile Fixes for Horizontal Overflow */
    @media (max-width: 1024px) {
        #claude-main-interface,
        main,
        .chat-container,
        #chat-messages {
            max-width: 100%;
            overflow-x: hidden !important;
        }

        .message-bubble,
        .message-user,
        .message-claude,
        .prose {
            max-width: 100%;
            overflow-wrap: break-word;
            word-wrap: break-word;
            word-break: break-word;
            overflow-x: hidden;
        }

        /* Code blocks inside messages */
        #claude-main-interface pre,
        #claude-main-interface code,
        .prose pre,
        .prose code,
        .table-wrapper {
            white-space: pre-wrap !important;
            word-break: normal !important;
            overflow-wrap: normal !important; /* Prioritize scrolling over breaking tokens */
            overflow-x: auto !important;
            max-width: 100% !important;
        }
    }

    .mobile-toggle {
        display: none;
        align-items: center;
        justify-content: center;
        min-width: 40px;
        height: 40px;
        color: #bd93f9;
        font-size: 1.25rem;
        cursor: pointer;
        transition: all 0.2s;
        z-index: 20;
    }
    .mobile-toggle:hover {
        background: rgba(189, 147, 249, 0.1);
        border-radius: 8px;
    }

    /* Neural Link Drawer */
    .jules-drawer {
        position: fixed;
        top: 0;
        right: -400px;
        width: 400px;
        height: 100%;
        background: #1e1f29;
        border-left: 1px solid #44475a;
        box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        z-index: 1000;
        transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
    }
    .jules-drawer.open {
        right: 0;
    }
    .jules-drawer-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        z-index: 990;
        display: none;
        opacity: 0;
        transition: opacity 0.3s ease;
    }
    .jules-drawer-overlay.active {
        display: block;
        opacity: 1;
    }
    @media (max-width: 768px) {
        .jules-drawer {
            width: 100%;
            right: -100%;
        }
    }

    /* Bootstrap Modal Fixes for Neural Interface */
    .modal-backdrop {
        z-index: 1040 !important;
    }
    .modal {
        z-index: 1050 !important;
    }
    .modal-content {
        background-color: #1e1f29 !important;
        border: 1px solid #44475a !important;
    }
    .modal-header, .modal-footer {
        border-color: #44475a !important;
    }

    /* Markdown Table Styles */
    .prose table {
        width: 100%;
        border-collapse: collapse;
        margin: 1rem 0;
        font-size: 0.85rem;
        border: 1px solid #44475a;
        border-radius: 8px;
        overflow: hidden;
    }
    .prose th {
        background-color: #282a36;
        color: #bd93f9;
        font-weight: 700;
        text-align: left;
        padding: 10px 12px;
        border-bottom: 2px solid #44475a;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .prose td {
        padding: 10px 12px;
        border-bottom: 1px solid #44475a;
        color: #f8f8f2;
    }
    .prose tr:last-child td {
        border-bottom: none;
    }
    .prose tr:hover td {
        background-color: rgba(189, 147, 249, 0.05);
    }
    .table-wrapper {
        width: 100%;
        overflow-x: auto;
        margin-bottom: 1rem;
        border-radius: 8px;
        border: 1px solid #44475a;
    }
    .table-wrapper table {
        margin: 0;
        border: none;
    }

    /* Session List Enhancements */
    .session-item {
        position: relative;
        overflow: visible;
        user-select: none;
        touch-action: pan-y;
    }
    .collapsed .session-item {
        overflow: visible;
    }
    .session-item-content {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        border-radius: 0.5rem;
        transition: all 0.2s;
        background-color: transparent;
        position: relative;
        z-index: 2;
        cursor: pointer;
        min-height: 40px;
    }
    .collapsed .session-item-content {
        flex-direction: column;
        justify-content: center;
        padding: 8px 0;
        gap: 2px;
    }
    .session-item.active .session-item-content {
        background-color: rgba(189, 147, 249, 0.1);
        color: white;
        border-right: 2px solid #bd93f9;
        border-radius: 0.5rem 0 0 0.5rem;
    }
    .session-item:not(.active) .session-item-content:hover {
        background-color: rgba(68, 71, 90, 0.4);
    }

    .session-actions {
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        display: flex;
        align-items: center;
        background-color: #ff5555;
        color: white;
        padding: 0 1rem;
        z-index: 1;
        transition: transform 0.2s ease;
    }

    .swipe-actions {
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        display: flex;
    }

    .swipe-action {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 50px;
        height: 100%;
        color: white;
        transition: background-color 0.2s;
    }

    .swipe-action-archive {
        background-color: #bd93f9;
    }

    .swipe-action-delete {
        background-color: #ff5555;
    }

    .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
        background-color: #50fa7b; /* Default: Normal (Green) */
        transition: all 0.2s;
    }
    .status-dot.active { background-color: #50fa7b; box-shadow: 0 0 6px #50fa7b; }
    .status-dot.linked { background-color: #bd93f9; box-shadow: 0 0 6px #bd93f9; }
    .status-dot.completed { background-color: #6272a4; opacity: 0.5; }
    .status-dot.error { background-color: #ff5555; box-shadow: 0 0 6px #ff5555; }

    .session-item-icon {
        display: none;
        font-size: 14px;
        color: #6272a4;
    }
    .collapsed .session-item-icon {
        display: block;
        margin-bottom: 2px;
    }
    .collapsed .status-dot {
        width: 4px;
        height: 4px;
    }

    /* Tooltip styles */
    .session-tooltip {
        position: fixed;
        left: 58px; /* sidebar width (48) + margin (10) */
        top: auto;
        transform: translateY(-50%);
        background: #1e1f29;
        color: white;
        padding: 6px 10px;
        border-radius: 4px;
        font-size: 11px;
        white-space: nowrap;
        z-index: 1000;
        border: 1px solid #44475a;
        pointer-events: none;
        display: none;
        opacity: 0;
        transition: opacity 0.2s;
        box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
    }
    .collapsed .session-item:hover .session-tooltip,
    .collapsed .group:hover .session-tooltip {
        display: block;
        opacity: 1;
    }

    .sidebar-footer-link {
        margin-top: auto;
        padding: 12px;
        border-top: 1px solid rgba(68, 71, 90, 0.5);
        font-size: 10px;
        font-weight: 700;
        color: #6272a4;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        transition: color 0.2s;
    }

    #mode-dropdown {
        animation: dropdown-pop 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes dropdown-pop {
        from { opacity: 0; transform: translateY(10px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .mode-jules #mode-selector-btn {
        border-color: #8be9fd/50;
    }
    .mode-jules #current-mode-label {
        color: #8be9fd;
    }
    .sidebar-footer-link:hover {
        color: #bd93f9;
    }
    .collapsed .sidebar-footer-link span {
        display: none;
    }
    .collapsed .sidebar-footer-link {
        text-align: center;
    }
</style>
