name: "Enforce CHANGELOG update"

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: dangoslen/changelog-enforcer@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          changeLogPath: CHANGELOG.html
          skipLabels: "skip-changelog,docs-only,chore"
          missingUpdateErrorMessage: |
            ❌ Este PR no actualiza CHANGELOG.html.
            Añade una entrada en la sección [Unreleased] describiendo
            qué cambiaste y por qué. Formato: Keep a Changelog
            (https://keepachangelog.com/es/1.0.0/)
